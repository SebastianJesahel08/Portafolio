<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Configuracion basica de caracteres para tildes y enes -->
    <meta charset="UTF-8">
    <!-- Hace que el diseno se adapte al ancho real del dispositivo -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sebastian Jesahel | Portfolio</title>

    <!-- Fuente principal para el nombre (estilo limpio y fino) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Hoja de estilos compartida entre intro y menu -->
    <link rel="stylesheet" href="Css/styles.css">
</head>

<body class="dark-mode">

<!-- Pantalla de introduccion inicial -->
<section class="nombre" id="intro">
    <div class="titulo-intro">
        <!-- Nombre principal del portfolio -->
        <h1>Sebastian Jesahel</h1>
        <!-- Linea visual separadora debajo del nombre -->
        <span class="linea-intro"></span>
        <!-- Subtitulo secundario del intro -->
        <p class="subtitulo-intro">Portafolio</p>
    </div>
</section>

<!-- Script que controla tiempo de intro y redireccion al menu -->
<script src="js/theme.js"></script>
<script src="js/script.js"></script>

</body>
</html>
